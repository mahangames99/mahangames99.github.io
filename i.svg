<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8e44ad"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- دایره اصلی که ۲۰٪ نسبت به قبل بزرگ‌تر شده (r: 18 -> 21.6) -->
  <circle cx="20" cy="20" r="21.6" fill="url(#grad)"/>
  
  <!-- لایه داخلی (r: 15 -> 18) -->
  <circle cx="20" cy="20" r="18" fill="#0f0f1a"/>
  
  <!-- حلقه بیرونی (r: 14 -> 16.8) -->
  <circle cx="20" cy="20" r="16.8" fill="none" stroke="#00e5ff" stroke-width="0.6" opacity="0.6"/>
  
  <!-- حرف M (font-size: 18 -> 21.6) -->
  <text x="20" y="26.5" font-family="'Segoe UI', sans-serif" font-size="21.6" fill="#00e5ff" text-anchor="middle" font-weight="900" filter="url(#glow)">M</text>
</svg>
