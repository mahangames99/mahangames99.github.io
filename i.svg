<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <!-- گرادینت بنفش-آبی برای ظاهر مدرن -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#00b894"/>
    </linearGradient>
    <!-- سایه برای عمق بخشی -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- دایره بیرونی با گرادینت -->
  <circle cx="16" cy="16" r="14" fill="url(#grad)" filter="url(#shadow)"/>
  
  <!-- دایره داخلی تیره (برای کنتراست) -->
  <circle cx="16" cy="16" r="11" fill="#1a1a2e"/>
  
  <!-- حلقه نازک آبی فسفری -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#00e5ff" stroke-width="0.8"/>
  
  <!-- حرف M (به سبک مونوسپیس) -->
  <text x="16" y="21.5" font-family="'Fira Code', 'Consolas', monospace" font-size="14" fill="#00e5ff" text-anchor="middle" font-weight="bold">M</text>
</svg>
